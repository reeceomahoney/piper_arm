# ============================================================
# Workspace
# ============================================================

[workspace]
authors = ["Reece O'Mahoney <reece.omahoney3@gmail.com>"]
channels = ["conda-forge"]
name = "distal"
platforms = ["linux-64", "linux-aarch64", "osx-arm64"]
version = "0.1.0"

# ============================================================
# Dependencies
# ============================================================

[dependencies]
python = ">=3.12,<3.13"
ffmpeg = ">=8.1.1,<9"
imagemagick = ">=7.1.2_21,<8"
cmake = ">=4.3.2,<5"
unzip = ">=6.0,<7"

[pypi-dependencies]
distal = { path = ".", editable = true }
lerobot = { git = "https://github.com/reeceomahoney/lerobot", branch = "distal", extras = [
  "libero",
  "libero-plus",
  "pi",
  "training",
] }
lerobot_policy_pistar06 = { path = "lerobot_policy_pistar06", editable = true }
slurm-tools = { git = "https://github.com/reeceomahoney/slurm-tools.git" }
skypilot = { git = "https://github.com/reeceomahoney/skypilot.git", branch = "vast-no-geo-pin", extras = [
  "vast",
  "kubernetes",
  "runpod",
] }
transformers = "==5.5.4"
hf-xet = ">=1.1.0"
piper-sdk = ">=0.6.1"
matplotlib = ">=3.7.0"
scikit-learn = ">=1.3.0"
rerun-sdk = ">=0.22"
vastai-sdk = ">=0.2.5,<0.3"
runpod = ">=1.8.2"
pyroute2 = ">=0.9.5"
pyopengl-accelerate = ">=3.1.10"
future = ">=1.0.0"
pre-commit = ">=4.5.1"
ruff = ">=0.15.2"
ty = ">=0.0.21"
lerobot-doctor = ">=0.1.0, <0.2"

[target.linux-64.pypi-dependencies]
nvidia-npp-cu12 = ">=12,<13"

[target.linux-aarch64.pypi-dependencies]
nvidia-npp-cu12 = ">=12,<13"

[feature.cu126.pypi-options]
extra-index-urls = ["https://download.pytorch.org/whl/cu126"]
index-strategy = "unsafe-best-match"

[feature.cu128.pypi-options]
extra-index-urls = ["https://download.pytorch.org/whl/cu128"]
index-strategy = "unsafe-best-match"

[feature.hardware.target.linux-64.pypi-dependencies]
lerobot = { git = "https://github.com/reeceomahoney/lerobot", branch = "distal", extras = [
  "intelrealsense",
  "deepdiff-dep",
] }
lerobot_robot_piper = { path = "lerobot_robot_piper", editable = true }
lerobot_teleoperator_piper = { path = "lerobot_teleoperator_piper", editable = true }
pynput = ">=1.7"

# ============================================================
# Activation
# ============================================================

[target.linux-64.activation.env]
LD_LIBRARY_PATH = "$CONDA_PREFIX/lib/python3.12/site-packages/nvidia/npp/lib:$LD_LIBRARY_PATH"

[target.linux-aarch64.activation.env]
LD_LIBRARY_PATH = "$CONDA_PREFIX/lib/python3.12/site-packages/nvidia/npp/lib:$LD_LIBRARY_PATH"

# ============================================================
# Environments
# ============================================================

[environments]
default = { features = ["cu128"], solve-group = "cu128" }
cu126 = { features = ["cu126"], solve-group = "cu126" }
hardware = { features = ["hardware", "cu128"], solve-group = "cu128" }

# ============================================================
# Tasks
# ============================================================

[tasks.train]
description = "Train base policy"
cmd = """
accelerate launch --multi_gpu --num_processes=2 -m \
  lerobot.scripts.lerobot_train --config_path=configs/train.yaml
"""

[tasks.eval]
description = "Evaluate policy in LIBERO sim"
cmd = "lerobot-eval --config_path=configs/eval.yaml"

[feature.hardware.tasks.record]
description = "Record demonstrations via teleop"
cmd = "lerobot-record --config_path=configs/record.yaml"

[feature.hardware.tasks.rollout]
description = "Rollout trained policy on physical arm"
cmd = "lerobot-rollout --config_path=configs/rollout.yaml"

[tasks.sky]
description = "Launch on Vast via SkyPilot, or sky exec on existing cluster_id"
args = [{ "arg" = "cluster_id", "default" = "" }]
cmd = """
{%- if cluster_id -%}
sky exec {{ cluster_id }} configs/sky.yaml --env HF_TOKEN --env WANDB_API_KEY
{%- else -%}
sky launch configs/sky.yaml -y --env HF_TOKEN --env WANDB_API_KEY
{%- endif -%}
"""

[tasks.collect-libero-plus]
description = "Fan out LIBERO-plus collection across one sky cluster per suite, then merge"
cmd = "./scripts/collect_libero_plus.sh"
