[workspace]
authors = ["Reece O'Mahoney <reece.omahoney3@gmail.com>"]
channels = ["conda-forge"]
name = "distal"
platforms = ["linux-64", "linux-aarch64", "osx-arm64"]
version = "0.1.0"

[dependencies]
python = ">=3.12,<3.13"
ffmpeg = ">=8.1.1,<9"
imagemagick = ">=7.1.2_21,<8"

[pypi-dependencies]
distal = { path = ".", editable = true }
lerobot = { git = "https://github.com/reeceomahoney/lerobot", branch = "distal", extras = [
  "libero",
  "libero-plus",
  "pi",
  "training",
] }
lerobot_policy_pistar06 = { path = "lerobot_policy_pistar06", editable = true }
slurm-tools = { git = "https://github.com/reeceomahoney/slurm-tools.git" }
skypilot = { git = "https://github.com/reeceomahoney/skypilot.git", branch = "vast-no-geo-pin", extras = [
  "vast",
  "kubernetes",
  "runpod",
] }
transformers = "==5.5.4"
piper-sdk = ">=0.6.1"
matplotlib = ">=3.7.0"
scikit-learn = ">=1.3.0"
rerun-sdk = ">=0.22"
vastai-sdk = ">=0.2.5,<0.3"
runpod = ">=1.8.2"
pyroute2 = ">=0.9.5"
pyopengl-accelerate = ">=3.1.10"
future = ">=1.0.0"
pre-commit = ">=4.5.1"
ruff = ">=0.15.2"
ty = ">=0.0.21"

[target.linux-64.pypi-dependencies]
torch = { version = "*", index = "https://download.pytorch.org/whl/cu126" }
torchvision = { version = "*", index = "https://download.pytorch.org/whl/cu126" }
torchcodec = { version = "*", index = "https://download.pytorch.org/whl/cu126" }

[target.linux-aarch64.pypi-dependencies]
torch = { version = "*", index = "https://download.pytorch.org/whl/cu126" }
torchvision = { version = "*", index = "https://download.pytorch.org/whl/cu126" }
torchcodec = { version = "*", index = "https://download.pytorch.org/whl/cu126" }

[feature.hardware.target.linux-64.pypi-dependencies]
lerobot = { git = "https://github.com/reeceomahoney/lerobot", branch = "distal", extras = [
  "intelrealsense",
] }
lerobot_robot_piper = { path = "lerobot_robot_piper", editable = true }
lerobot_teleoperator_piper = { path = "lerobot_teleoperator_piper", editable = true }

[environments]
default = { solve-group = "default" }
hardware = { features = ["hardware"], solve-group = "default" }

# Training

[tasks.train]
description = "Train base policy"
cmd = """
accelerate launch --multi_gpu --num_processes=2 \
  -m lerobot.scripts.lerobot_train --config_path configs/train.yaml \
  --policy.type=pi05 \
  --policy.repo_id=reece-omahoney/pi05-remove-pen-lid \
  --policy.pretrained_path=lerobot/pi05_base \
  --policy.n_action_steps=10 \
  --policy.compile_model=true \
  --policy.gradient_checkpointing=true \
  --policy.dtype=bfloat16 \
  --policy.freeze_vision_encoder=false \
  --policy.train_expert_only=false
"""

[tasks.eval]
description = "Evaluate policy in LIBERO sim"
cmd = """
lerobot-eval --config_path configs/eval.yaml \
  --policy.path=lerobot/pi05-libero \
  --policy.n_action_steps=10
"""

# Hardware

[tasks.record]
description = "Record demonstrations via teleop"
cmd = "lerobot-record --config_path configs/record.yaml"

[tasks.rollout]
description = "Rollout trained policy on physical arm"
cmd = """
lerobot-rollout --config_path configs/rollout.yaml \
  --policy.path=reece-omahoney/pi05-remove-pen-lid \
  --policy.n_action_steps=20
"""

# Cluster

[tasks.sky]
description = "Launch on Vast via SkyPilot, or sky exec on existing cluster_id"
args = [{ "arg" = "cluster_id", "default" = "" }]
cmd = """
if [ -n "{{ cluster_id }}" ]; then
  sky exec {{ cluster_id }} configs/sky.yaml --env HF_TOKEN --env WANDB_API_KEY
else
  sky launch configs/sky.yaml -y --env HF_TOKEN --env WANDB_API_KEY
fi
"""

[tasks.sky-ssh]
description = "Same as sky but via SSH cloud config"
args = [{ "arg" = "cluster_id", "default" = "" }]
cmd = """
if [ -n "{{ cluster_id }}" ]; then
  sky exec {{ cluster_id }} configs/sky-ssh.yaml --env HF_TOKEN --env WANDB_API_KEY
else
  sky launch configs/sky-ssh.yaml -y --env HF_TOKEN --env WANDB_API_KEY
fi
"""

[tasks.sweep]
description = "Create wandb sweep and submit N SLURM agents (default 5)"
args = [{ "arg" = "n_agents", "default" = "5" }]
cmd = "./scripts/launch_sweep.sh {{ n_agents }}"

[tasks.collect]
description = "Fan out LIBERO-plus collection across one sky cluster per suite, then merge"
cmd = "./scripts/launch_collect.sh"
