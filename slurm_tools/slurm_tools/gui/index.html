<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SLURM Monitor</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖥️</text></svg>"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <script src="https://unpkg.com/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.3.0/sse.js"></script>
  </head>
  <body>
    <h1>SLURM Monitor</h1>

    <div class="layout">
      <div class="left">
        <div class="card left-top">
          <div class="card-header">
            <h2>Jobs</h2>
            <div class="btn-group">
              <button
                class="btn"
                id="fetch-results-btn"
                onclick="fetchResults()"
              >
                Fetch Results
              </button>
              <button class="btn" id="clean-logs-btn" onclick="cleanLogs()">
                Clean Logs
              </button>
            </div>
          </div>
          <div hx-get="/jobs" hx-trigger="load, every 10s" hx-swap="innerHTML">
            Loading...
          </div>
        </div>
        <div class="card left-bottom">
          <h2>GPUs</h2>
          <div hx-get="/nodes" hx-trigger="load, every 30s" hx-swap="innerHTML">
            Loading...
          </div>
        </div>
      </div>
      <div class="card right" id="log-panel">
        <div class="log-placeholder" id="log-placeholder">
          Select a job to view logs
        </div>
        <div id="log-content" style="display: none">
          <div class="log-header">
            <h2 id="log-title">Logs</h2>
            <button class="btn" onclick="closeLog()">Close</button>
          </div>
          <pre class="log" id="log-stream"></pre>
        </div>
      </div>
    </div>

    <script>
      var _src;
      function openLog(id, follow) {
        if (_src) _src.close();
        $("#log-placeholder").hide();
        $("#log-content").css("display", "flex");
        $("#log-title").text("Job " + id);
        var $s = $("#log-stream").empty();
        var url = "/logs/" + id + (follow ? "" : "?follow=0");
        _src = new EventSource(url);
        _src.onmessage = function (e) {
          $s.append(document.createTextNode(e.data + "\n"));
          $s.scrollTop($s[0].scrollHeight);
        };
        _src.onerror = function () {
          _src.close();
        };
      }
      function closeLog() {
        if (_src) _src.close();
        $("#log-content").hide();
        $("#log-placeholder").css("display", "flex");
        $("#log-stream").empty();
      }
      function fetchResults() {
        var $btn = $("#fetch-results-btn");
        $btn.prop("disabled", true).text("Fetching Results...");
        $.ajax({ url: "/fetch-results", method: "PUT" }).always(function () {
          $btn.prop("disabled", false).text("Fetch Results");
        });
      }
      function cleanLogs() {
        if (!confirm("Delete logs for completed jobs?")) return;
        var $btn = $("#clean-logs-btn");
        $btn.prop("disabled", true).text("Cleaning...");
        $.ajax({ url: "/clean-logs", method: "DELETE" }).always(function () {
          $btn.prop("disabled", false).text("Clean Logs");
        });
      }
      function cancelJob(id, btn) {
        if (!confirm("Cancel job " + id + "?")) return;
        var $btn = $(btn);
        $btn.prop("disabled", true).text("cancelling…");
        $.post("/cancel/" + id).always(function () {
          htmx.ajax("GET", "/jobs", {
            target: '[hx-get="/jobs"]',
            swap: "innerHTML",
          });
        });
      }
    </script>
  </body>
</html>
