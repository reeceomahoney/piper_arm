{% if gpus %}
<table>
  <tr>
    <th>GPU</th>
    <th style="width:60%">Utilization</th>
  </tr>
  {% for gpu in gpus %}
  <tr>
    <td style="font-weight:600">{{ gpu.type }}</td>
    <td>
      <div class="gpu-bar">
        <div class="gpu-bar-used" style="width:{{ gpu.pct }}%">
          {% if gpu.pct > 15 %}{{ gpu.used }}{% endif %}
        </div>
        <div class="gpu-bar-free" style="width:{{ 100 - gpu.pct }}%">
          {% if 100 - gpu.pct > 15 %}{{ gpu.free }}{% endif %}
        </div>
      </div>
    </td>
  </tr>
  {% endfor %}
</table>
{% else %}
<em>No data</em>
{% endif %}
