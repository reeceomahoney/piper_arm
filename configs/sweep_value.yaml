program: distal/train_value.py
method: bayes
entity: reeceomahoney
project: distal-value
metric:
  name: val/loss
  goal: minimize

# Use draccus-style flags. The default ${args} macro expands to
# `--key value` (space-separated), which draccus accepts.
command:
  - python
  - ${program}
  - ${args}

parameters:
  # ── Fixed for this sweep ─────────────────────────────────────────
  batch_size:
    value: 64
  epochs:
    value: 2
  push_to_hub:
    value: false                      # don't overwrite the hub repo every trial
  wandb_run_name:
    value: ""                         # let wandb auto-name sweep trials

  # ── Swept hyperparameters ────────────────────────────────────────
  learning_rate:
    distribution: log_uniform_values
    min: 5.0e-5
    max: 5.0e-4

  weight_decay:
    distribution: log_uniform_values
    min: 1.0e-6
    max: 1.0e-3

  warmup_steps:
    values: [100, 250, 500, 1000]

  num_unfrozen_backbone_layers:
    values: [1, 3, 5, 8]

# Stop trials early if val/loss stalls badly relative to peers.
# min_iter counts val/loss reports (one per validate_every_n_train_steps=50),
# so 15 ≈ 750 train steps before pruning.
early_terminate:
  type: hyperband
  min_iter: 15
  eta: 2
