name: distal-train

resources:
  cloud: gcp
  accelerators: tpu-v4-8
  zone: us-central2-b
  accelerator_args:
    runtime_version: tpu-ubuntu2204-base
  # cpus: 16+
  # disk_size: 64
  autostop:
    idle_minutes: 10
    down: true

envs:
  HF_TOKEN:
  WANDB_API_KEY:
  MUJOCO_GL: egl
  PYOPENGL_PLATFORM: egl
  SLURM_JOB_ID: 0  # suppress tqdm
workdir: .

setup: |
  sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libglvnd0 libopengl0 cmake g++

  curl https://mise.run | sh
  echo 'eval "$($HOME/.local/bin/mise activate bash)"' >> ~/.bashrc
  export PATH="$HOME/.local/bin:$PATH"
  eval "$(mise activate bash)"
  cd ~/sky_workdir
  mise trust

  uv sync

  mkdir ~/.libero
  cat <<EOF > ~/.libero/config.yaml
  assets: $HOME/sky_workdir/.venv/lib/python3.12/site-packages/libero/libero/./assets
  bddl_files: $HOME/sky_workdir/.venv/lib/python3.12/site-packages/libero/libero/./bddl_files
  benchmark_root: $HOME/sky_workdir/.venv/lib/python3.12/site-packages/libero/libero
  datasets: $HOME/sky_workdir/.venv/lib/python3.12/site-packages/libero/libero/../datasets
  init_states: $HOME/sky_workdir/.venv/lib/python3.12/site-packages/libero/libero/./init_files
  EOF

  cd ~/sky_workdir
  python ~/sky_workdir/.venv/lib/python3.12/site-packages/robosuite/scripts/setup_macros.py

run: |
  cd ~/sky_workdir
  uv run mise run adv-train adv-libero-steps-penalty
  # uv run distal/compute_advantage_labels.py
