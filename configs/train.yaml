job_name: smolvla-libero-bsz-256
num_workers: 8
batch_size: 256
steps: 100_000
eval_freq: 10_000

dataset:
  repo_id: lerobot/libero
  use_imagenet_stats: false

env:
  type: libero
  task: libero_10
  fps: 10

# these are overriden when finetuning
policy:
  type: smolvla
  repo_id: reece-omahoney/smolvla-libero-bsz-256
  device: cuda
  chunk_size: 16
  n_action_steps: 8
  load_vlm_weights: true
  resize_imgs_with_padding: [256, 256]
  max_state_dim: 8
  max_action_dim: 7
  scheduler_decay_steps: 100_000
  use_amp: true

eval:
  n_episodes: 5
  batch_size: 5

wandb:
  enable: true
  disable_artifact: true
