job_name: smolvla-libero-success-adv
num_workers: 16
batch_size: 256
steps: 100_000
eval_freq: 10_000

dataset:
  repo_id: reece-omahoney/libero-10-success-adv

env:
  type: libero
  task: libero_10
  fps: 10

policy:
  type: advantage
  repo_id: reece-omahoney/smolvla-libero-success-adv
  smolvla_checkpoint: reece-omahoney/smolvla-libero-16-chunk
  stats_repo_id: lerobot/libero
  use_advantage_tokens: true
  advantage_dropout: 0.3
  device: cuda
  chunk_size: 16
  n_action_steps: 8
  load_vlm_weights: true
  resize_imgs_with_padding: [256, 256]
  max_state_dim: 8
  max_action_dim: 7
  scheduler_decay_steps: 100_000

eval:
  n_episodes: 5
  batch_size: 5

wandb:
  enable: true
  disable_artifact: true
  project: distal
