program: distal/train_pi_star.py
method: bayes
entity: reeceomahoney
project: distal
metric:
  name: eval/pc_success
  goal: maximize

# Use draccus-style flags. The default ${args} macro expands to
# `--key value` (space-separated), which draccus accepts.
command:
  - python
  - ${program}
  - ${args}

parameters:
  # ── Fixed for this sweep ─────────────────────────────────────────
  batch_size:
    value: 128
  epochs:
    value: 3                          # 3 epochs catches the typical peak (step 2000-3000)
  sim_eval_every_n_train_steps:
    value: 750                        # 3 evals per trial @ steps 750/1500/2250 (~23 min each)
  validate_every_n_train_steps:
    value: 1000                       # cheap stratified val twice per trial
  push_to_hub:
    value: false                      # don't upload every trial
  wandb_run_name:
    value: ""                         # let wandb auto-name sweep trials (see _init_wandb)

  # ── Swept hyperparameters ────────────────────────────────────────
  learning_rate:
    distribution: log_uniform_values
    min: 2.0e-5
    max: 5.0e-4

  decay_learning_rate:
    distribution: log_uniform_values
    min: 1.0e-6
    max: 5.0e-5

  weight_decay:
    distribution: log_uniform_values
    min: 1.0e-8
    max: 1.0e-3

  advantage_threshold_percentile:
    values: [60, 65, 70, 75, 80]

  advantage_dropout:
    distribution: uniform
    min: 0.1
    max: 0.5

  num_unfrozen_backbone_layers:
    values: [0, 3, 6]

# Stop trials early if pc_success stalls badly relative to peers
early_terminate:
  type: hyperband
  min_iter: 1500                      # let trials reach step 1500 before pruning
  eta: 2
