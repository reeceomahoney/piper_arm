<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SLURM Monitor</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.3.0/sse.js"></script>
  </head>
  <body>
    <h1>SLURM Monitor</h1>

    <div class="layout">
      <div class="left">
        <div class="card left-top">
          <h2>Jobs</h2>
          <div
            hx-get="/jobs"
            hx-trigger="load, every 10s"
            hx-swap="innerHTML"
          >
            Loading...
          </div>
        </div>
        <div class="card left-bottom">
          <h2>Nodes</h2>
          <div
            hx-get="/nodes"
            hx-trigger="load, every 30s"
            hx-swap="innerHTML"
          >
            Loading...
          </div>
        </div>
      </div>
      <div class="card right" id="log-panel">
        <div class="log-placeholder" id="log-placeholder">
          Select a running job to view logs
        </div>
        <div id="log-content" style="display: none">
          <div class="log-header">
            <h2 id="log-title">Logs</h2>
            <button class="btn" onclick="closeLog()">Close</button>
          </div>
          <pre class="log" id="log-stream"></pre>
        </div>
      </div>
    </div>

    <script>
      function openLog(jobId) {
        var placeholder = document.getElementById("log-placeholder");
        var content = document.getElementById("log-content");
        var stream = document.getElementById("log-stream");
        var title = document.getElementById("log-title");
        placeholder.style.display = "none";
        content.style.display = "flex";
        title.textContent = "Job " + jobId;
        stream.innerHTML = "";
        if (window._logSource) window._logSource.close();
        var evtSource = new EventSource("/logs/" + jobId);
        evtSource.onmessage = function (e) {
          stream.textContent += e.data + "\n";
          stream.scrollTop = stream.scrollHeight;
        };
        evtSource.onerror = function () {
          evtSource.close();
        };
        window._logSource = evtSource;
      }
      function closeLog() {
        if (window._logSource) window._logSource.close();
        document.getElementById("log-content").style.display = "none";
        document.getElementById("log-placeholder").style.display = "flex";
        document.getElementById("log-stream").innerHTML = "";
      }
      function cancelJob(jobId) {
        if (!confirm("Cancel job " + jobId + "?")) return;
        fetch("/cancel/" + jobId, { method: "POST" }).then(function () {
          htmx.ajax("GET", "/jobs", {
            target: '[hx-get="/jobs"]',
            swap: "innerHTML",
          });
        });
      }
    </script>
  </body>
</html>
