[env]
_.python.venv = ".venv"

# Training

[tasks.train]
description = "Train base policy"
run = "lerobot-train --config_path configs/train.yaml"

[tasks.eval]
description = "Evaluate policy in LIBERO sim"
run = """
lerobot-eval --config_path configs/eval.yaml \
  --policy.path=lerobot/pi05-libero \
  --policy.n_action_steps=10
"""

# Hardware

[tasks.record]
description = "Record demonstrations via teleop"
run = "lerobot-record --config_path configs/record.yaml"

[tasks.play]
description = "Play trained policy on physical arm"
run = "lerobot-record --config_path configs/play.yaml --policy.path=reece-omahoney/smolvla-libero-256"

# Cluster

[tasks.sky]
description = "Launch training on vast.ai via SkyPilot, or exec on a running cluster if given a cluster ID"
usage = 'arg "[cluster_id]"'
run = """
{% if usage.cluster_id %}
sky exec {{ usage.cluster_id }} configs/sky.yaml --env HF_TOKEN --env WANDB_API_KEY
{% else %}
sky launch configs/sky.yaml -y --env HF_TOKEN --env WANDB_API_KEY
{% endif %}
"""

[tasks.sky-ssh]
description = "Launch training via SkyPilot using SSH config, or exec on a running cluster if given a cluster ID"
usage = 'arg "[cluster_id]"'
run = """
{% if usage.cluster_id %}
sky exec {{ usage.cluster_id }} configs/sky-ssh.yaml --env HF_TOKEN --env WANDB_API_KEY
{% else %}
sky launch configs/sky-ssh.yaml -y --env HF_TOKEN --env WANDB_API_KEY
{% endif %}
"""

[tasks.container]
description = "Build Singularity container and upload to cluster"
# Default /tmp is a 32G tmpfs — too tight for squashfs assembly of a CUDA image.
# Redirect tmp/cache to $HOME (475G partition).
env = { SINGULARITY_TMPDIR = "{{ env.HOME }}/.cache/singularity/tmp", SINGULARITY_CACHEDIR = "{{ env.HOME }}/.cache/singularity/cache" }
run = """
mkdir -p "$SINGULARITY_TMPDIR" "$SINGULARITY_CACHEDIR"
singularity build --force --fakeroot container.sif container.def
scp container.sif htc:/data/engs-robotics-ml/kebl6123/distal/container.sif
"""

[tasks.sweep]
description = "Create wandb sweep and submit N SLURM agents (default 5)"
usage = 'arg "[n_agents]"'
run = "./scripts/launch_sweep.sh {{ usage.n_agents | default(value='5') }}"

[tasks.collect]
description = "Fan out LIBERO-plus collection across one sky cluster per suite, then merge"
run = "./scripts/launch_collect.sh"
